<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD ESHITA ✨</title>
    <style>
        :root {
            --pink: #ffafcc;
            --hot-pink: #ff006e;
            --glass: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; overflow: hidden;
            color: white;
        }

        #countdown-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #4a001e 0%, #000 100%);
            font-size: 6rem; font-weight: 900; letter-spacing: -2px;
        }

        #main-stage {
            display: none; height: 100vh; width: 100vw;
            grid-template-columns: 1fr 2fr 1fr; align-items: center;
            background: radial-gradient(circle at center, #3d002a 0%, #000 100%);
            padding: 20px; box-sizing: border-box;
        }

        /* 3D Carousel */
        .carousel {
            position: relative; width: 220px; height: 320px;
            margin: auto; transform-style: preserve-3d;
            animation: rotate 15s infinite linear;
        }

        .carousel img {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; border-radius: 24px;
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.5);
            border: 1.5px solid rgba(255,255,255,0.4);
        }

        /* 5 Photos Logic */
        .carousel img:nth-child(1) { transform: rotateY(0deg) translateZ(320px); }
        .carousel img:nth-child(2) { transform: rotateY(72deg) translateZ(320px); }
        .carousel img:nth-child(3) { transform: rotateY(144deg) translateZ(320px); }
        .carousel img:nth-child(4) { transform: rotateY(216deg) translateZ(320px); }
        .carousel img:nth-child(5) { transform: rotateY(288deg) translateZ(320px); }

        @keyframes rotate { from { transform: rotateY(0); } to { transform: rotateY(360deg); } }

        /* Side Cards */
        .side-col { display: flex; flex-direction: column; gap: 30px; z-index: 10; }
        .glass-card {
            background: var(--glass); backdrop-filter: blur(25px);
            padding: 20px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.15);
            font-size: 1.1rem; font-weight: 500; text-align: center;
            animation: bang 1.5s ease-in-out infinite alternate;
        }

        @keyframes bang { from { transform: scale(0.98); opacity: 0.8; } to { transform: scale(1.03); opacity: 1; } }

        /* Apple Music Lyrics Engine */
        .lyrics-box {
            position: absolute; bottom: 80px; width: 100%; height: 100px;
            text-align: center; font-size: 2.8rem; font-weight: 800;
        }
        .lyric {
            opacity: 0; filter: blur(10px); transform: translateY(30px);
            transition: all 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: absolute; width: 100%; left: 0;
        }
        .lyric.active {
            opacity: 1; filter: blur(0); transform: translateY(0);
            text-shadow: 0 0 30px rgba(255,255,255,0.6);
        }

        /* Apple Emoji Decorations */
        .emoji-png {
            position: absolute; width: 80px; z-index: -1;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            animation: drift 8s linear infinite;
        }
        @keyframes drift { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-10vh) rotate(360deg); } }

        .cake-corner { position: absolute; bottom: 30px; right: 30px; width: 120px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="countdown-screen">00:00:00</div>

    <div id="main-stage">
        <div class="side-col">
            <div class="glass-card">💍 Every single day with you is a blessing, Eshita.</div>
            <div class="glass-card">💖 My heart beats only for you.</div>
        </div>

        <div class="carousel">
            <img src="img1.jpg"> <img src="img2.jpg"> <img src="img3.jpg"> <img src="img4.jpg"> <img src="img5.jpg">
        </div>

        <div class="side-col">
            <div class="glass-card">🎂 To the most beautiful girl in the world...</div>
            <div class="glass-card">✨ I found my 'Perfect' in you.</div>
        </div>

        <div class="lyrics-box" id="lyric-engine"></div>
        <img src="cake.png" class="cake-corner">
    </div>

    <audio id="audio" src="music.mp3"></audio>

    <script>
        // Update these seconds to match the Ed Sheeran song!
        const lyrics = [
            { t: 0, text: "I found a love... for me" },
            { t: 4, text: "Darling, just dive right in" },
            { t: 8, text: "And follow my lead" },
            { t: 13, text: "I found a girl, beautiful and sweet" },
            { t: 18, text: "Happy Birthday Eshita! ❤️" }
        ];

        function startHype() {
            document.getElementById('countdown-screen').style.display = 'none';
            document.getElementById('main-stage').style.display = 'grid';
            const player = document.getElementById('audio');
            player.play();

            // Spawn floating Apple Emoji PNGs
            const emojiFiles = ['heart.png', 'gift.png', 'cake.png'];
            for(let i=0; i<15; i++) {
                let img = document.createElement('img');
                img.src = emojiFiles[Math.floor(Math.random()*emojiFiles.length)];
                img.className = 'emoji-png';
                img.style.left = Math.random()*100 + 'vw';
                img.style.animationDelay = Math.random()*5 + 's';
                document.body.appendChild(img);
            }

            // Lyric Engine
            let engine = document.getElementById('lyric-engine');
            lyrics.forEach((line, i) => {
                let div = document.createElement('div');
                div.className = 'lyric';
                div.id = 'line-' + i;
                div.innerText = line.text;
                engine.appendChild(div);
            });

            setInterval(() => {
                let time = player.currentTime;
                lyrics.forEach((line, i) => {
                    if (time >= line.t) {
                        document.querySelectorAll('.lyric').forEach(l => l.classList.remove('active'));
                        document.getElementById('line-' + i).classList.add('active');
                    }
                });
            }, 100);
        }

        function updateTimer() {
            const now = new Date();
            const target = new Date();
            target.setHours(24, 0, 0, 0); 
            
            const diff = target - now;
            if (diff <= 0) {
                startHype();
            } else {
                let h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                let m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                let s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('countdown-screen').innerText = `${h}:${m}:${s}`;
                setTimeout(updateTimer, 1000);
            }
        }
        updateTimer();
    </script>
</body>
</html>
